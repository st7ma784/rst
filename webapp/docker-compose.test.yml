version: '3.8'

# Launches all three processing backends + frontend for cross-backend testing.
# Run with:
#   docker compose -f docker-compose.test.yml up --build
# Then in another terminal:
#   cd webapp/tests && pytest test_backends.py -v \
#       --backend-urls http://localhost:8001,http://localhost:8002,http://localhost:8003

x-backend-common: &backend-common
  volumes:
    - uploads_shared:/tmp/siw_uploads
    - results_shared:/tmp/siw_results
  depends_on: []

services:

  backend-pythonv2:
    <<: *backend-common
    build:
      context: ..
      dockerfile: webapp/backend/Dockerfile.pythonv2
    ports:
      - "8001:8000"
    environment:
      - BACKEND_TYPE=pythonv2
      - PYTHONPATH=/pythonv2
      - CORS_ORIGINS=http://localhost:3000

  backend-cuda:
    <<: *backend-common
    build:
      context: ..
      dockerfile: webapp/backend/Dockerfile.cuda
    ports:
      - "8002:8000"
    environment:
      - BACKEND_TYPE=cuda
      - PYTHONPATH=/pythonv2
      - CORS_ORIGINS=http://localhost:3000
    # GPU access — uncomment when running on a CUDA host
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  backend-rst:
    <<: *backend-common
    build:
      context: ..
      dockerfile: webapp/backend/Dockerfile.rst
    ports:
      - "8003:8000"
    environment:
      - BACKEND_TYPE=rst
      - PYTHONPATH=/pythonv2
      - CORS_ORIGINS=http://localhost:3000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend-pythonv2:8000
    depends_on:
      - backend-pythonv2

volumes:
  uploads_shared:
  results_shared:
