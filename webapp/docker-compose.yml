# SuperDARN Interactive Workbench — production Docker Compose
#
# Single C-backed backend (RST via libgrdopt + libfitacf.3.0).
# The pythonv2 and CUDArst alternatives were retired; the backend
# image is built from webapp/backend/Dockerfile.rst.
#
# Usage:
#   cp .env.example .env          # fill in your values
#   docker compose up -d          # start
#   docker compose logs -f        # tail logs
name: superdarn-workbench

services:

  backend:
    image: ${REGISTRY:-}siw-backend:${TAG:-latest}
    build:
      context: ..
      dockerfile: webapp/backend/Dockerfile.rst
    environment:
      DATA_DIR:      /data
      CORS_ORIGINS:  ${CORS_ORIGINS:-http://localhost}
      RST_BINPATH:   /opt/rst/codebase/bin/linux
    volumes:
      - data:/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ${REGISTRY:-}siw-frontend:${TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
    driver: local

networks:
  default:
    name: superdarn-net
