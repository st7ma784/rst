# SuperDARN Interactive Workbench — production Docker Compose
#
# Usage:
#   cp .env.example .env          # fill in your values
#   docker compose up -d          # start
#   docker compose logs -f        # tail logs
#
# For multi-backend testing see docker-compose.test.yml.
# For hot-reload development see docker-compose.override.yml.
name: superdarn-workbench

services:

  backend:
    image: ${REGISTRY:-}siw-backend:${TAG:-latest}
    build:
      context: ..
      dockerfile: webapp/backend/Dockerfile.${BACKEND_TYPE:-pythonv2}
    environment:
      BACKEND_TYPE:  ${BACKEND_TYPE:-pythonv2}
      DATA_DIR:      /data
      CORS_ORIGINS:  ${CORS_ORIGINS:-http://localhost}
      PYTHONPATH:    /pythonv2
    volumes:
      - data:/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # GPU access — uncomment when running on a CUDA host:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    image: ${REGISTRY:-}siw-frontend:${TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
    driver: local

networks:
  default:
    name: superdarn-net
