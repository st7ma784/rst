# Development overrides — applied automatically by `docker compose up`.
# Enables hot-reload and mounts source code for live editing.
# Do NOT commit secrets to this file.
services:

  backend:
    build:
      context: ..
      dockerfile: webapp/backend/Dockerfile.${BACKEND_TYPE:-pythonv2}
    volumes:
      - ../pythonv2:/pythonv2:ro          # live pythonv2 edits
      - ./backend:/app                    # live backend edits
      - data:/data
    command: >
      uvicorn main:app
        --host 0.0.0.0 --port 8000
        --reload --reload-dir /app
        --log-level debug
    ports:
      - "8000:8000"

  frontend:
    image: ""                             # skip the nginx image
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    command: npm run dev -- --host 0.0.0.0
