apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "superdarn.fullname" . }}-backend
  labels:
    {{- include "superdarn.labels" . | nindent 4 }}
    {{- include "superdarn.backendSelectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "superdarn.backendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "superdarn.labels" . | nindent 8 }}
        {{- include "superdarn.backendSelectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.backend.gpu.enabled }}
      nodeSelector:
        {{- toYaml .Values.backend.gpu.nodeSelector | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: {{ .Values.backend.env.pythonPath | quote }}
            - name: CUDA_VISIBLE_DEVICES
              value: {{ .Values.backend.env.cudaVisibleDevices | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.backend.env.corsOrigins | quote }}
          volumeMounts:
            - name: uploads
              mountPath: /tmp/siw_uploads
            - name: results
              mountPath: /tmp/siw_results
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- if .Values.backend.gpu.enabled }}
          # GPU resource limits require the NVIDIA device plugin DaemonSet.
          # Install with: kubectl apply -f https://raw.githubusercontent.com/NVIDIA/k8s-device-plugin/main/deployments/static/nvidia-device-plugin.yml
          resources:
            limits:
              {{- toYaml .Values.backend.gpu.limits | nindent 14 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "superdarn.fullname" . }}-uploads
        - name: results
          persistentVolumeClaim:
            claimName: {{ include "superdarn.fullname" . }}-results
