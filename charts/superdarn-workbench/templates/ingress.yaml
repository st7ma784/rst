{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "superdarn.fullname" . }}
  labels:
    {{- include "superdarn.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Backend: REST API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "superdarn.backendServiceName" . }}
                port:
                  number: {{ .Values.backend.port }}
          # Backend: WebSocket progress feed
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "superdarn.backendServiceName" . }}
                port:
                  number: {{ .Values.backend.port }}
          # Frontend: all other traffic
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "superdarn.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
