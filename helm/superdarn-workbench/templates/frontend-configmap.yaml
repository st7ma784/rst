# nginx config for the frontend pod.
# Uses nginxinc/nginx-unprivileged which listens on 8080 (non-root safe).
# Proxies /api/ and /ws/ to the backend ClusterIP service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "superdarn-workbench.fullname" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "superdarn-workbench.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  default.conf: |
    server {
        listen {{ include "superdarn-workbench.frontendPort" . }};
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_types text/plain text/css application/javascript application/json
                   application/wasm image/svg+xml;

        # REST API — forward to FastAPI backend
        location /api/ {
            proxy_pass         {{ include "superdarn-workbench.backendServiceURL" . }};
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            client_max_body_size 500m;
        }

        # Swagger UI
        location /docs {
            proxy_pass {{ include "superdarn-workbench.backendServiceURL" . }};
            proxy_set_header Host $host;
        }

        # WebSocket — live job progress
        location /ws/ {
            proxy_pass             {{ include "superdarn-workbench.backendServiceURL" . }};
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "Upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     3600s;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
        }

        location ~* \.(js|css|woff2?|png|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location = /health {
            access_log off;
            return 200 "ok\n";
        }
    }
