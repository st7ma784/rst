apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "superdarn-workbench.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "superdarn-workbench.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "superdarn-workbench.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "superdarn-workbench.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
      annotations:
        {{- with .Values.frontend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "superdarn-workbench.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.frontend.podSecurityContext | nindent 8 }}
      containers:
        - name: frontend
          image: {{ include "superdarn-workbench.frontendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.frontend.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ include "superdarn-workbench.frontendPort" . }}
              protocol: TCP
          env:
            # nginx-unprivileged's entrypoint runs envsubst on
            # /etc/nginx/templates/default.conf.template at container
            # start (script 20-envsubst-on-templates.sh) and writes
            # /etc/nginx/conf.d/default.conf. We point BACKEND_URL at
            # the chart's own backend Service — without it, the
            # Dockerfile default `http://backend:8000` lands in the
            # rendered config and nginx emerg-aborts with
            # `host not found in upstream "backend"`.
            - name: BACKEND_URL
              value: {{ include "superdarn-workbench.backendServiceURL" . | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          volumeMounts:
            # nginx-unprivileged needs writable tmp dirs and a writable
            # /etc/nginx/conf.d so its envsubst entrypoint can render
            # the template with the BACKEND_URL env var above. We do NOT
            # mount a ConfigMap here — the previous configmap+envsubst
            # double-management caused the upstream "backend" emerg.
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-conf
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
