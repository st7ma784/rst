apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "superdarn-workbench.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "superdarn-workbench.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  # 20 min progress deadline. Default of 10 min isn't enough when the
  # cluster pulls siw-frontend from a slow / cold registry. Fleet
  # surfaces "Progress deadline exceeded" when this trips, even if the
  # pod is otherwise fine — so we give it room.
  progressDeadlineSeconds: 1200
  selector:
    matchLabels:
      {{- include "superdarn-workbench.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "superdarn-workbench.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
      annotations:
        {{- with .Values.frontend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "superdarn-workbench.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.frontend.podSecurityContext | nindent 8 }}
      # initContainer pre-renders the nginx config from the in-image
      # template into the shared emptyDir. This avoids the
      # entrypoint-script + emptyDir + permission interaction in
      # nginx-unprivileged that produced "host not found in upstream"
      # in previous versions of the chart. The main container then
      # bypasses the entrypoint scripts and starts nginx directly.
      initContainers:
        - name: render-config
          image: {{ include "superdarn-workbench.frontendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.frontend.securityContext | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # The template ships at this path inside the image.
              src=/etc/nginx/templates/default.conf.template
              dst=/render/default.conf
              if [ ! -f "$src" ]; then
                echo "render-config: $src not found in image" >&2
                exit 1
              fi
              # envsubst is available in nginx-unprivileged. Restrict
              # substitution to BACKEND_URL so nginx's own $variable
              # references (e.g. $host, $remote_addr) stay literal.
              envsubst '${BACKEND_URL}' < "$src" > "$dst"
              echo "render-config: wrote $dst with BACKEND_URL=$BACKEND_URL"
          env:
            - name: BACKEND_URL
              value: {{ include "superdarn-workbench.backendServiceURL" . | quote }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /render
      containers:
        - name: frontend
          image: {{ include "superdarn-workbench.frontendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.frontend.securityContext | nindent 12 }}
          # Skip the docker-entrypoint.sh script wrapper — it tries to
          # re-render templates into /etc/nginx/conf.d/ (which is now
          # populated by our initContainer) and was the source of the
          # previous ConfigMap/envsubst collision.
          command: ["nginx", "-g", "daemon off;"]
          ports:
            - name: http
              containerPort: {{ include "superdarn-workbench.frontendPort" . }}
              protocol: TCP
          # startupProbe gives the entrypoint up to ~5 min to finish
          # envsubst + start nginx before liveness/readiness kick in.
          # Without it, slow-pull pods can hit readiness failures
          # immediately, get restarted, and never converge.
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          volumeMounts:
            # /etc/nginx/conf.d is the shared emptyDir written by the
            # render-config initContainer above. The main container
            # only needs read access to it once nginx starts.
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
            # nginx-unprivileged also writes to /tmp (PID, client_body),
            # /var/cache/nginx, /var/run during operation.
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-conf
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
