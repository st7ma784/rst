name: SuperDARN RST Performance Testing

# Scaffolding-only workflow.
#
# The original version was an 883-line pipeline with 7 jobs spanning
# Docker container builds (CPU + optimized), test-data generation, matrix
# benchmark runs, regression checks, dashboard publishing via GitHub Pages,
# and PR comment summaries. It referenced a non-existent
# `dockerfile.optimized`, a fictional `/app/run_performance_tests.sh`, and
# pinned several jobs to `clusteros-runner` (not registered on this fork).
# Every run failed inside the first 30 seconds.
#
# This version preserves the trigger surface (and the workflow_dispatch
# inputs the dashboard pages link to) but reduces the body to a single
# tolerant container build so the workflow runs green while the perf
# harness is rebuilt. Restore commits 0fcb4a21..main for the original
# pipeline content.

on:
  push:
    branches: [ main ]
    paths:
      - 'codebase/superdarn/**'
      - 'Dockerfile'
      - '.github/workflows/performance-testing.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'codebase/superdarn/**'
      - 'Dockerfile'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run (ignored - scaffold only)'
        required: false
        default: 'standard'
        type: choice
        options:
          - quick
          - standard
          - comprehensive
          - benchmark

jobs:
  build-container:
    name: Build RST test container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build RST image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: rst-perf-test:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Note next steps
        run: |
          echo "Container built. The full performance harness"
          echo "(matrix benchmarks, regression checks, dashboard publishing)"
          echo "is not in this repo today. See workflow header for context."
