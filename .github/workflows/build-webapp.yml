# Build and push the SuperDARN Workbench webapp images.
#
# Produces:
#   <DOCKER_USERNAME>/rst-webapp-backend:latest-cpu
#   <DOCKER_USERNAME>/rst-webapp-frontend:latest
#
# Backend is built from webapp/backend/Dockerfile.rst (context: repo root so
# the Dockerfile can reach codebase/ for the RST binary build).
# A CUDA-specific backend variant (latest-cuda) can be added once a
# Dockerfile.cuda exists under webapp/backend/.

name: Build and Push Webapp Images

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
      - 'pythonv2/**'
      - 'codebase/**'
      - '.github/workflows/build-webapp.yml'
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend (latest-cpu)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: webapp/backend/Dockerfile.rst
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKER_USERNAME }}/rst-webapp-backend:latest-cpu
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/rst-webapp-backend:latest-cpu-cache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/rst-webapp-backend:latest-cpu-cache,mode=max

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: webapp/frontend
          file: webapp/frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKER_USERNAME }}/rst-webapp-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/rst-webapp-frontend:latest-cache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/rst-webapp-frontend:latest-cache,mode=max
