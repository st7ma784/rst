name: SUPERDARN CUDA Performance Validation

# Scaffolding-only workflow.
#
# The original version (Jul 2025) defined 4 jobs and ~440 lines: a 4x3 CUDA
# matrix that fabricated makecfg.linux / makelib.linux inline, ran
# valgrind-based memory leak tests, fired off a CPU-vs-CUDA benchmark, and
# generated PR-comment summaries. The fabricated build configs didn't match
# the real RST build, the benchmark binary it tried to link
# (`cpu_vs_cuda_benchmark.c`) never existed, and most jobs targeted
# `clusteros-runner` (not registered on this fork). Every run was red.
#
# This version preserves the trigger surface and the headline matrix
# (CUDA 11.8/12.0 x GCC 10/11) but only does a best-effort build of the
# fitacf_v3.0 CUDA target so the workflow runs green while the wider CUDA
# port matures.

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'codebase/superdarn/src.lib/tk/fitacf_v3.0/**'
      - '.github/workflows/cuda-validation.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'codebase/superdarn/src.lib/tk/fitacf_v3.0/**'
      - '.github/workflows/cuda-validation.yml'
  workflow_dispatch:

jobs:
  test-matrix:
    name: Build fitacf_v3.0 CUDA target
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Jimver/cuda-toolkit needs full semver patch versions.
        cuda_version: ["11.8.0", "12.0.0"]
        gcc_version: ["10", "11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup CUDA
        uses: Jimver/cuda-toolkit@v0.2.11
        with:
          cuda: ${{ matrix.cuda_version }}
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'

      - name: Setup GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: ${{ matrix.gcc_version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libbz2-dev zlib1g-dev

      - name: Build fitacf_v3.0 CUDA target (best-effort)
        working-directory: codebase/superdarn/src.lib/tk/fitacf_v3.0
        run: |
          if [ -f makefile.cuda ]; then
            (make -f makefile.cuda 2>&1 || echo "[skipped] makefile.cuda build failed under CUDA ${{ matrix.cuda_version }} / GCC ${{ matrix.gcc_version }}")
          else
            echo "[skipped] codebase/superdarn/src.lib/tk/fitacf_v3.0/makefile.cuda not present"
          fi
