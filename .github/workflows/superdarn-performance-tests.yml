name: SuperDARN Performance Tests & Benchmarks

# Scaffolding-only workflow.
#
# The original version (~420 lines, 8 jobs) was a sibling of
# performance-testing.yml - same shape, slightly different framing - and
# failed for the same reasons: missing `dockerfile.fitacf`, missing
# scripts under scripts/ that the steps assumed, and jobs targeted at the
# `clusteros-runner` self-hosted label not registered on this fork.
#
# Reduced here to a single best-effort image build using the real
# repo-root Dockerfile. Preserves the workflow name so any external
# reference (badge, dashboard link, branch protection rule) still
# resolves. Restore commits 0fcb4a21..main for the previous content.

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'codebase/superdarn/**'
      - 'Dockerfile'
      - '.github/workflows/superdarn-performance-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'codebase/superdarn/**'
      - 'Dockerfile'
      - '.github/workflows/superdarn-performance-tests.yml'
  workflow_dispatch:

jobs:
  build-test-image:
    name: Build SuperDARN test image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: superdarn-testing:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Note next steps
        run: |
          echo "Image built. Full perf/benchmark suite (FitACF, speck-removal,"
          echo "dashboard, regression) is not in this repo today. Restore prior"
          echo "workflow from git history once the supporting scripts land."
