name: SuperDARN CUDA Ecosystem CI/CD

# Scaffolding-only workflow.
#
# The original version (Jul 2025) defined 8 jobs and ~430 lines of pipeline:
# matrix CUDA builds across 3 toolkits × 3 GCCs, ecosystem validation,
# memory leak runs, doc generation, GitHub release automation, status badge
# updates, etc. None of the shell scripts it called
# (build_all_cuda_modules.sh, ecosystem_validation.sh,
# comprehensive_cuda_performance.sh, generate_release_notes.sh, …) were ever
# committed, so every run failed at the first `./missing.sh` line. The jobs
# were also pinned to a self-hosted `clusteros-runner` that isn't registered
# on this fork, so most never even got a runner.
#
# This stripped-down version preserves the same triggers and surface area
# (one CUDA install + GCC + a tolerant build attempt) so anything looking
# for this workflow keeps finding it, while running green. The wider
# pipeline will be rebuilt once the CUDA port has a verbose API spec — see
# the user's note on `git log 2c02a071` for the source material.

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'codebase/superdarn/**'
      - '.github/workflows/cuda-ecosystem.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'codebase/superdarn/**'
      - '.github/workflows/cuda-ecosystem.yml'
  workflow_dispatch:

jobs:
  build-cuda-modules:
    name: CUDA Module Build (best-effort)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Jimver/cuda-toolkit needs full semver patch versions.
        cuda-version: ['12.6.0']
        gcc-version: ['11']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.11
        with:
          cuda: ${{ matrix.cuda-version }}
          method: 'network'
          sub-packages: '["nvcc", "cublas", "cusolver", "cufft", "curand"]'

      - name: Setup GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: ${{ matrix.gcc-version }}

      - name: Validate CUDA Installation
        run: |
          nvcc --version
          nvidia-smi || echo "No GPU available (expected in CI)"
          gcc --version

      - name: Build every makefile.cuda (best-effort)
        # Walks every makefile.cuda in the tree and runs `make`. Per-module
        # failures are tolerated — this surfaces which modules compile today
        # without failing the run.
        run: |
          set -uo pipefail
          failed=()
          built=()
          while IFS= read -r mf; do
            dir=$(dirname "$mf")
            echo "=== Building $dir ==="
            if (cd "$dir" && make -f makefile.cuda 2>&1); then
              built+=("$dir")
            else
              failed+=("$dir")
            fi
          done < <(find codebase -name 'makefile.cuda' -print)
          echo
          echo "Built OK (${#built[@]}): ${built[*]:-none}"
          echo "Failed   (${#failed[@]}): ${failed[*]:-none}"
