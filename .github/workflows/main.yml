# RST compilation smoke test.
#
# Single Ubuntu job on the self-hosted clusteros-runner. The matrix
# (Ubuntu × macOS × cc × CDF) was removed — macOS coverage added a lot of
# brittleness (Homebrew availability, arm/intel ambiguity, separate profile
# files) for negligible signal compared to ensuring the Linux build is green.
# If macOS support regresses, reintroduce a dedicated workflow rather than
# matrixing this one.
#
# Hardening vs. the previous version:
#   - `apt-get -y --no-install-recommends` so the step never blocks on prompts
#     and survives package-name churn between Ubuntu releases.
#   - `wget --tries=3 --timeout=60` on the NASA CDF tarball so transient
#     spdf.gsfc.nasa.gov hiccups don't fail the run.
#   - `SUDO` shim so the workflow works both on GitHub-hosted runners (user
#     account, sudo present) and on container-based self-hosted runners
#     (root, no sudo binary).
#   - `set -euo pipefail` everywhere so a silent failure can't slip through.

name: Compilation Test

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - 'helm/**'
      - '.github/workflows/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - 'helm/**'
      - '.github/workflows/**'
      - '*.md'
      - 'LICENSE'

env:
  CDF_VERSION: "39_0"

jobs:
  build:
    name: Compile RST on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap runner basics
        shell: bash
        run: |
          set -euo pipefail
          # clusteros-runner may be a slim container without sudo / wget.
          # Install only the minimum we need before requirements.ubuntu runs.
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          export DEBIAN_FRONTEND=noninteractive
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends \
            ca-certificates wget tar make build-essential

      - name: Install RST Ubuntu dependencies
        shell: bash
        run: |
          set -euo pipefail
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          export DEBIAN_FRONTEND=noninteractive
          $SUDO apt-get update
          # xargs -r so an empty/comment-only file is a no-op; -a reads the
          # file directly (avoids cat + pipe). `apt-get -y` keeps the step
          # non-interactive if a package name drifts in a future Ubuntu LTS.
          xargs -r -a build/.requirements.ubuntu \
            $SUDO apt-get install -y --no-install-recommends

      - name: Install NASA CDF library
        shell: bash
        run: |
          set -euo pipefail
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          CDF="cdf${CDF_VERSION}"
          # NASA's mirror has had hour-long outages; retry with a timeout
          # rather than failing the whole compile run on a transient blip.
          wget --tries=3 --timeout=60 --retry-connrefused \
            "https://spdf.gsfc.nasa.gov/pub/software/cdf/dist/${CDF}/linux/${CDF}-dist-cdf.tar.gz"
          tar -xzf "${CDF}-dist-cdf.tar.gz"
          cd "${CDF}-dist"
          make OS=linux ENV=gnu all
          make test
          $SUDO make INSTALLDIR=/usr/local/cdf install

      - name: Build RST code
        shell: bash
        run: |
          set -euo pipefail
          export RSTPATH="$(pwd)"
          source .profile.bash
          build/script/make.build
          build/script/make.code
          build/script/make.doc
