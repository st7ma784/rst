name: Grid Search Optimization Tests

# Best-effort build of the optimized grid library + its test corpus.
#
# Previous version: a 3x2 (gcc 9/10/11 x OpenMP true/false) matrix that ran
# `make test` in codebase/superdarn/src.lib/tk/grid.1.24_optimized.1. That
# directory's Makefile has no `test` target — make defaulted to the `test/`
# subdir as a filename and bailed out with "make: *** .: Is a directory.
# Stop." on every run.
#
# This version builds whatever does exist (the lib's main target), and only
# attempts to compile the test C files if a recognisable target turns up.
# Single GCC, one config — until the test harness is properly wired into
# the Makefile there's no point matrixing over compilers.

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'codebase/superdarn/src.lib/tk/grid.1.24_optimized.1/**'
      - '.github/workflows/grid-search-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'codebase/superdarn/src.lib/tk/grid.1.24_optimized.1/**'
      - '.github/workflows/grid-search-test.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build grid.1.24_optimized.1
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libgomp1

      - name: Attempt to build via repo build system
        # The Makefile here uses MAKECFG/MAKELIB from the parent RST build
        # system. We invoke it under a configured RST env so it has a
        # chance to compile; failures don't fail the workflow because the
        # underlying test harness still needs work.
        working-directory: codebase/superdarn/src.lib/tk/grid.1.24_optimized.1
        run: |
          export RSTPATH="${GITHUB_WORKSPACE}"
          source "${RSTPATH}/.profile.bash" 2>/dev/null || true
          make clean 2>/dev/null || true
          (make 2>&1 || echo "[skipped] main build target failed; see log")
          if grep -qE '^\s*test\s*:' Makefile makefile 2>/dev/null; then
            (make test 2>&1 || echo "[skipped] test target failed")
          else
            echo "[skipped] no 'test' target in this Makefile yet"
          fi
