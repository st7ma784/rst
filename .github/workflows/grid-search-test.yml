name: Grid Optimized Library Tests

# Builds libgrdopt + grid_opt_compare harness and runs the equivalence /
# benchmark suite on every push touching the grid.1.24_optimized.1 tree.
#
# AUDIT.md B4: this workflow gates merges on the libgrdopt API surface.
# Sort and LocateCell equivalence must hold (zero fail / zero mismatch);
# the per-op (Average/Merge/Integrate) tests are opt-in via --with-ops
# until Phase D reworks GridAverageParallel/GridMergeParallel.
#
# We rely on the parent RST build system (.profile.bash sets MAKECFG /
# MAKELIB / IPATH / LIBPATH). The harness links against libgrd, libdmap,
# librtime, librcnv which are all part of the same checkout.

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'codebase/superdarn/src.lib/tk/grid.1.24_optimized.1/**'
      - 'codebase/superdarn/src.bin/tk/testing/grid_opt_compare.1.0/**'
      - '.github/workflows/grid-search-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'codebase/superdarn/src.lib/tk/grid.1.24_optimized.1/**'
      - 'codebase/superdarn/src.bin/tk/testing/grid_opt_compare.1.0/**'
      - '.github/workflows/grid-search-test.yml'
  workflow_dispatch:

jobs:
  build-and-run-harness:
    name: Build libgrdopt + run grid_opt_compare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libgomp1 zlib1g-dev

      - name: Build RST dependencies (headers + libgrd, libdmap, librtime, librcnv, librmath, librfile)
        # libgrdopt's *.c sources include rtypes.h / dmap.h / rfile.h /
        # rmath.h / rtime.h / griddata.h, so these libraries have to be
        # built first to populate $IPATH/{base,general,superdarn} via the
        # `hdr` target in makelib.linux. The grid_opt_compare harness then
        # links against the produced static libs.
        #
        # Order matters: rtypes is a header-only dep of dmap; dmap is a
        # header-only dep of grid; etc. Failures here are fatal -- earlier
        # workflow rounds masked missing libs with `|| echo [warn]`, which
        # is how addgrid_parallel.c reached the compiler with no rtypes.h.
        run: |
          set -euo pipefail
          export RSTPATH="${GITHUB_WORKSPACE}"
          source "${RSTPATH}/.profile.bash" 2>/dev/null || true

          for lib in \
              codebase/base/src.lib/task/rtypes.1.5 \
              codebase/base/src.lib/math/rmath.1.8 \
              codebase/general/src.lib/time.1.7 \
              codebase/base/src.lib/task/convert.1.11 \
              codebase/general/src.lib/dmap.1.25 \
              codebase/general/src.lib/rfile.1.9 \
              codebase/superdarn/src.lib/tk/grid.1.24 ; do
            if [ ! -d "${lib}/src" ]; then
              echo "::error::missing dependency tree: ${lib}/src"
              exit 1
            fi
            echo "::group::Building ${lib}"
            (cd "${lib}/src" && make)
            echo "::endgroup::"
          done

      - name: Build libgrdopt (optimized grid library)
        run: |
          set -euo pipefail
          export RSTPATH="${GITHUB_WORKSPACE}"
          source "${RSTPATH}/.profile.bash" 2>/dev/null || true
          cd codebase/superdarn/src.lib/tk/grid.1.24_optimized.1/src
          make clean 2>/dev/null || true
          make

      - name: Build grid_opt_compare harness
        run: |
          set -euo pipefail
          export RSTPATH="${GITHUB_WORKSPACE}"
          source "${RSTPATH}/.profile.bash" 2>/dev/null || true
          cd codebase/superdarn/src.bin/tk/testing/grid_opt_compare.1.0/src
          make clean 2>/dev/null || true
          make

      - name: Run harness (single-threaded smoke)
        # Single-threaded baseline. Validates the sequential code path
        # and the C4/C5 LocateCell optimizations without engaging the
        # parallel merge in C3.
        run: |
          set -euo pipefail
          export RSTPATH="${GITHUB_WORKSPACE}"
          source "${RSTPATH}/.profile.bash" 2>/dev/null || true
          export LD_LIBRARY_PATH="${RSTPATH}/lib:${LD_LIBRARY_PATH:-}"
          OMP_NUM_THREADS=1 "${RSTPATH}/bin/grid_opt_compare"

      - name: Run harness (multi-threaded)
        # OMP=4 exercises the C3 parallel sort path. Sort equiv_fail
        # must remain 0 -- this is the regression gate.
        run: |
          set -euo pipefail
          export RSTPATH="${GITHUB_WORKSPACE}"
          source "${RSTPATH}/.profile.bash" 2>/dev/null || true
          export LD_LIBRARY_PATH="${RSTPATH}/lib:${LD_LIBRARY_PATH:-}"
          OMP_NUM_THREADS=4 "${RSTPATH}/bin/grid_opt_compare"
